<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 问答</title>
    <style>
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f7fa;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        form {
            margin: 30px 0;
        }

        input[type="text"] {
            width: 70%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        input[type="submit"] {
            padding: 14px 28px;
            font-size: 16px;
            background: #2c6ef0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }

        input[type="submit"]:hover {
            background: #1a54c2;
        }

        /* 回答框：简单、宽大、清晰 */
        #answerBox {
            margin-top: 30px;
            padding: 24px 28px;
            background: white;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 16px;
            line-height: 1.6;
            color: #222;
            min-height: 120px;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <h1>🤖 简单问答</h1>
    <p>输入问题，获取 AI 回答</p>

    <form id="questionForm">
        <input type="text" id="question" name="question" placeholder="例如：苹果公司是做什么的？" autocomplete="off">
        <input type="submit" value="提问">
    </form>

    <div id="answerBox">💬 回答将显示在这里</div>

    <script>
        const form = document.getElementById('questionForm');
        const answerBox = document.getElementById('answerBox');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const question = document.getElementById('question').value.trim();
            if (!question) {
                answerBox.textContent = '⚠️ 请输入问题';
                return;
            }

            answerBox.textContent = '🤔 思考中...';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'question=' + encodeURIComponent(question)
                });

                const data = await response.json();

                if (data.answer) {
                    answerBox.textContent = data.answer;
                } else {
                    answerBox.textContent = '❌ 未获取到回答，请稍后重试';
                }
            } catch (error) {
                answerBox.textContent = '⚠️ 网络错误，请检查连接';
                console.error(error);
            }
        });
    </script>
</body>
</html>
